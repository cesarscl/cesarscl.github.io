<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Ecommerce</title>
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <div class="layout">
      <header class="navbar">
        <h1>Mi Ecommerce</h1>
      </header>

      <aside class="sidebar">
        <h2>Categorías</h2>
        <ul class="categories">
          <li><a href="#">Perfumes <span>(13)</span></a></li>
          <li><a href="#">Ropa <span>(21)</span></a></li>
          <li><a href="#">Accesorios <span>(41)</span></a></li>
          <li><a href="#">Zapatos <span>(10)</span></a></li>
        </ul>
      </aside>

      <main class="products">
        <article class="product-card">
          <img
            src="./assets/image/perfume-mykingdom.jpg"
            alt="Perfume myKingdom"
          />
          <div class="product-info">
            <h3>Perfume myKingdom</h3>
            <p>31.400</p>
          </div>
          <button>Comprar</button>
        </article>

        <article class="product-card">
          <img
            src="./assets/image/perfume-phantom.jpg"
            alt="Perfume Phantom"
          />
          <div class="product-info">
            <h3>Perfume Phantom</h3>
            <p>68.900</p>
          </div>
          <button>Comprar</button>
        </article>

        <article class="product-card">
          <img src="./assets/image/zapatos-docker.jpg" alt="Zapatos Docker" />
          <div class="product-info">
            <h3>Zapatos Docker</h3>
            <p>29.700</p>
          </div>
          <button>Comprar</button>
        </article>

        <article class="product-card">
          <img src="./assets/image/poleron-puma.jpg" alt="Poleron puma" />
          <div class="product-info">
            <h3>Poleron puma</h3>
            <p>44.700</p>
          </div>
          <button>Comprar</button>
        </article>
      </main>

      <footer class="footer">
        <p>@miecommerce</p>
      </footer>
    </div>
  </body>
</html>
