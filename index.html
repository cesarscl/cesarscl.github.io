<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 1 - Calculando el total</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>
    <main class="contenedor">
        <section class="producto">
            <div class="card">
                <div class="img-card"></div>
                <h6>Laptop Gamer AMD</h6>
                <p>Precio base: $<span class="precio-inicial"></span></p>

                <p class="cantidad-producto">
                    Cantidad:
                    <span class="cantidad">0</span>
                    <button onclick="sumarProducto()" aria-label="Aumentar cantidad">+</button>
                    <button onclick="restarProducto()" aria-label="Disminuir cantidad">-</button>
                </p>
            </div>
        </section>

        <div class="total-section">
            <p>Total a pagar: $<span class="valor-total"></span></p>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
